name: Build and Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (leave empty for latest tag)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      # Set up Bun
      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Install dependencies and build the web UI
      - name: Install dependencies and build web UI
        working-directory: ./web-ui
        run: |
          bun install
          bun run build

      # Set up Rust
      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      # Build the Rust project
      - name: Build Rust project
        run: cargo build --release

      # Compress the build artifacts
      - name: Compress build artifacts (Linux)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          mkdir -p release
          cp target/release/enoact ./release/
          cp target/release/enoact-presence ./release/
          tar -czvf enoact-linux-x86_64.tar.gz -C ./release .

      - name: Compress build artifacts (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          mkdir release
          cp target\release\enoact.exe release\
          cp target\release\enoact-presence.exe release\
          7z a enoact-windows-x86_64.7z release || powershell Compress-Archive -Path release\* -DestinationPath enoact-windows-x86_64.zip

      # Upload the compressed file as a release asset
      - name: Create Release
        if: ${{ matrix.os == 'ubuntu-latest' }}
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ matrix.os == 'ubuntu-latest' && './enoact-linux-x86_64.tar.gz' || './enoact-windows-x86_64.7z' }}
          asset_name: ${{ matrix.os == 'ubuntu-latest' && 'enoact-linux-x86_64.tar.gz' || 'enoact-windows-x86_64.7z' }}
          asset_content_type: ${{ matrix.os == 'ubuntu-latest' && 'application/gzip' || 'application/x-7z-compressed' }}
